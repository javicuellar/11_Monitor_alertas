#  Monitor de acciones con alertas por email y Telegram
services:
  monitor:
    build:
      context: .
      dockerfile: Dockerfile
    container_name: stock-monitor
    restart: unless-stopped

    environment:
      # Timezone – adjust to your locale
      TZ: Europe/Madrid
      DB_PATH: /data/monitor.db

      # ── Optional: override via environment instead of manage.py ──────────
      SMTP_HOST: smtp.gmail.com
      SMTP_PORT: "587"
      SMTP_USER: you@gmail.com
      SMTP_PASS: your_app_password
      SMTP_FROM: you@gmail.com
      SMTP_TO:   recipient@email.com
      TG_TOKEN:  123456:ABC-your-bot-token
      TG_CHAT:   "-100xxxxxxxxx"

    volumes:
      # Persist the SQLite database outside the container
      - ./data:/data
      # Optional: mount logs to host
      - ./logs:/var/log

    # Health check: verify the DB exists
    healthcheck:
      test: ["CMD", "test", "-f", "/data/monitor.db"]
      interval: 60s
      timeout: 5s
      retries: 3
      start_period: 15s
